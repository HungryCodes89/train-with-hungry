<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #222;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World</h1>
    <p>This is a simple starter page. Edit the text, styles, and link below to make it yours.</p>
    <a href="#">Get Started</a>
  </div>
</body>
</html>
